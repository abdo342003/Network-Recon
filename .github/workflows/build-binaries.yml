name: Build Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pillow

      - name: Ensure icon exists
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/app.ico")) {
            python assets/create_placeholder_icon.py
          }

      - name: Build Windows EXE
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --icon assets/app.ico src/network_recon.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: network-recon-windows
          path: dist/network_recon.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build Linux binary
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed src/network_recon.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: network-recon-linux
          path: dist/network_recon
